name: Publish NuGet

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Validate tag matches csproj version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CSPROJ_VERSION=$(grep -oPm1 "(?<=<Version>)[^<]+" RaiImage.csproj)
          echo "Tag version: ${TAG_VERSION}"
          echo "Project version: ${CSPROJ_VERSION}"
          if [[ "${TAG_VERSION}" != "${CSPROJ_VERSION}" ]]; then
            echo "Tag version does not match RaiImage.csproj <Version>."
            exit 1
          fi

      - name: Restore
        run: dotnet restore RaiImage.slnx

      - name: Build
        run: dotnet build RaiImage.slnx --configuration Release --no-restore

      - name: Pack
        run: dotnet pack RaiImage.csproj --configuration Release --no-build --output artifacts

      - name: Publish to NuGet
        run: |
          dotnet nuget push "artifacts/*.nupkg" \
            --api-key "${{ secrets.NUGET_API_KEY }}" \
            --source "https://api.nuget.org/v3/index.json" \
            --skip-duplicate
