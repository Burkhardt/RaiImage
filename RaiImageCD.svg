 font-size="13" lengthAdjust="spacing" textLength="378.4155" x="2374.29" y="290.3658">ImageMagick -&gt; ImageMagickCommand -&gt; CliCommand.</text></g><g class="entity" data-qualified-name="GMN39" data-source-line="112" id="ent0040"><path d="M2303.7,856.4173 L2303.7,898.0159 L2634.3069,898.0159 L2634.3069,866.4173 L2624.3069,856.4173 L2303.7,856.4173" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M2624.3069,856.4173 L2624.3069,866.4173 L2634.3069,866.4173 L2624.3069,856.4173" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="309.6069" x="2309.7" y="874.4871">ImageTreeFile adds path-convention semantics</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="288.0947" x="2309.7" y="890.2864">on top of the core ImageFile naming model.</text></g><!--link ImageFile to RaiFile--><g class="link" data-entity-1="ent0003" data-entity-2="ent0017" data-link-type="extension" data-source-line="82" id="lnk20"><path codeLine="82" d="M1084.09,723.6173 C1089.75,724.8373 1095.39,726.0273 1101,727.1673 C1410.27,790.2373 1517.37,678.7073 1807,804.1673 C1833.8,815.7773 1846.2216,825.7334 1861.7716,842.6834" fill="none" id="ImageFile-to-RaiFile" style="stroke:#000000;stroke-width:1;"/><polygon fill="none" points="1873.94,855.9473,1866.1929,838.6273,1857.3503,846.7395,1873.94,855.9473" style="stroke:#000000;stroke-width:1;"/></g><!--link ImageTreeFile to ImageFile--><g class="link" data-entity-1="ent0004" data-entity-2="ent0003" data-link-type="extension" data-source-line="83" id="lnk21"><path codeLine="83" d="M780.85,803.7973 C775.19,788.3273 769.07,772.1373 763,757.1673 C759.06,747.4473 761.9466,753.9736 757.6466,743.9336" fill="none" id="ImageTreeFile-to-ImageFile" style="stroke:#000000;stroke-width:1;"/><polygon fill="none" points="750.56,727.3873,752.1311,746.2958,763.162,741.5714,750.56,727.3873" style="stroke:#000000;stroke-w